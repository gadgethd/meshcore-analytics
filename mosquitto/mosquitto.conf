# MeshCore Analytics - Mosquitto configuration
# WebSockets only — all traffic routes through Cloudflare Tunnel

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all

# WebSocket listener only (no plain TCP MQTT)
listener 9001
protocol websockets

# Allow anonymous connections for Phase 1
# Phase 2 will add auth via ACL + password file
allow_anonymous true

# Connection limits
max_connections 500
max_keepalive 300
